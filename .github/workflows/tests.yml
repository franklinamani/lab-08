name: Java CI (JUnit without Gradle)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download JUnit and Hamcrest
        run: |
          curl -L -o junit-4.13.2.jar https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          curl -L -o hamcrest-core-1.3.jar https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

      - name: Compile main sources
        run: |
          mkdir -p build/classes/main
          find app/src/main/java -name "*.java" > sources_main.txt
          if [ -s sources_main.txt ]; then
            javac -cp . -d build/classes/main @sources_main.txt
          fi

      - name: Compile test sources
        run: |
          mkdir -p build/classes/test
          find app/src/test/java -name "*.java" > sources_test.txt
          if [ -s sources_test.txt ]; then
            javac -cp build/classes/main:junit-4.13.2.jar:hamcrest-core-1.3.jar -d build/classes/test @sources_test.txt
          fi

      - name: Run JUnit tests
        run: |
          java -cp build/classes/main:build/classes/test:junit-4.13.2.jar:hamcrest-core-1.3.jar org.junit.runner.JUnitCore com.example.lab8.CustomListTest

